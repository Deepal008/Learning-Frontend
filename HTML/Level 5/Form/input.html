<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/contact-me">
        Username: <input type="text" placeholder="Enter your username" required=" true" ><br>
        Password: <input type="password" placeholder="password"><br>

        Date: <input type="date"><br>

        file: <input type="file"><br>

        Color: <input type="color"><br>

        Range: <input type="range"><br>
        
        Poke Me: <input type="button"  value="poked"><br>
        <hr>

        <!-- radio input -->
        <label for="male">Male:</label>
        <input type="radio" id="male" name="Geneder" value="male"><br>

        <label for="female">Female:</label>
        <input type="radio" id="female" name="Geneder" value="Female"><br>

        <label for="other" >Other:</label>
        <input type="radio" id="other" name="Geneder" value="Other"><br>

        <hr>

        <label for="c">C</label>
        <input type="checkbox" name="language" id="c" value="C">
        <br>
        <label for="java">Java</label>
        <input type="checkbox" name="language" id="java" value="Java">
        <br>
        <label for="python">Python</label>
        <input type="checkbox" name="language" id="python" value="Python">
        <br>
        <hr>
        Submit: <input type="submit" >
    </form>
</body>
</html>
